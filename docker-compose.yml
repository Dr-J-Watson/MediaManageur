# =============================================================================
# docker-compose.yml — Source de vérité de la stack
#
# Ce fichier est versionné et ne doit pas être modifié manuellement pour
# activer/désactiver des services ou configurer le GPU.
#
# Premier démarrage :
#   make init     → génère l'override, configure les services et le GPU
#
# Utilisation courante :
#   make up       → lance la stack
#   make help     → liste toutes les commandes disponibles
# /
# docker-compose.yml — Source of truth for the stack
# 
# This file is versioned and should not be manually edited to enable/disable
# services or configure the GPU.
# 
# First startup:
#   make init     → generates the override, configures services and GPU
# 
# Common usage:
#   make up       → starts the stack
#   make help     → lists all available commands
# =============================================================================
#
# Accès locaux (ports définis dans .env) / Local access (ports defined in .env) :
#   qBittorrent (via Gluetun) : http://IP_DU_SERVEUR:${QBITTORRENT_PORT}
#   Prowlarr                  : http://IP_DU_SERVEUR:${PROWLARR_PORT}
#   Radarr                    : http://IP_DU_SERVEUR:${RADARR_PORT}
#   Sonarr                    : http://IP_DU_SERVEUR:${SONARR_PORT}
#   Lidarr                    : http://IP_DU_SERVEUR:${LIDARR_PORT}
#   Questarr                  : http://IP_DU_SERVEUR:${QUESTARR_PORT}
#   Jellyseerr                : http://IP_DU_SERVEUR:${JELLYSEERR_PORT}
#   Jellyfin                  : http://IP_DU_SERVEUR:${JELLYFIN_PORT}
#   Homarr                    : http://IP_DU_SERVEUR:${HOMARR_PORT}
#   GameVault                 : http://IP_DU_SERVEUR:${GAMEVAULT_PORT}
#   FlareSolverr              : http://IP_DU_SERVEUR:${FLARESOLVERR_PORT}
# =============================================================================

services:

  # ===========================================================================
  # Couche VPN et téléchargement / VPN layer and downloading
  # Désactiver gluetun désactive aussi qbittorrent (network_mode: service:gluetun). / Disabling gluetun also disables qbittorrent (network_mode: service:gluetun).
  # ===========================================================================

  gluetun:
    # Conteneur VPN — encapsule le trafic réseau de qBittorrent. / VPN container — encapsulates qBittorrent's network traffic.
    # qBittorrent partage le namespace réseau de Gluetun via network_mode. / qBittorrent shares Gluetun's network namespace via network_mode.
    # Nécessite VPN_PROVIDER, VPN_TYPE, VPN_KEY, VPN_COUNTRY dans .env. / Requires VPN_PROVIDER, VPN_TYPE, VPN_KEY, VPN_COUNTRY in .env.
    image: qmcgaw/gluetun:${GLUETUN_VERSION}
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${VPN_KEY}
      - SERVER_COUNTRIES=${VPN_COUNTRY}
      - FIREWALL_PORT_FORWARD=on
    ports:
      - "${QBITTORRENT_PORT}:8080"
    restart: unless-stopped

  qbittorrent:
    # Client torrent isolé derrière Gluetun. / Isolated torrent client behind Gluetun.
    # Accessible depuis les autres conteneurs via gluetun:8080. / Accessible from other containers via gluetun:8080.
    image: lscr.io/linuxserver/qbittorrent:${QBITTORRENT_VERSION}
    container_name: qbittorrent
    network_mode: "service:gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_DIR}/qbittorrent:/config
      - ${DATA_DIR}/torrents:/data/torrents
      - ${DATA_DIR}/media/jeux:/data/media/jeux
    depends_on:
      - gluetun
    restart: unless-stopped

  # ===========================================================================
  # Indexation torrent / Torrent indexing
  # ===========================================================================

  prowlarr:
    # Gestionnaire d'indexers centralisé pour Radarr, Sonarr et Lidarr. / Centralized indexer manager for Radarr, Sonarr and Lidarr.
    # Synchronise automatiquement les indexers vers toutes les apps *Arr. / Automatically syncs indexers to all *Arr apps.
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_VERSION}
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${PROWLARR_PORT}:9696"
    volumes:
      - ${CONFIG_DIR}/prowlarr:/config
    restart: unless-stopped

  # ===========================================================================
  # Automatisation médias (movies, séries, musique) / Media automation (movies, series, music)
  # ===========================================================================

  radarr:
    # Gestion et téléchargement automatique des films. / Automatic movie management and downloading.
    # Mounts limités à torrents + media/films pour préserver les hardlinks. / Mounts limited to torrents + media/films to preserve hardlinks.
    image: lscr.io/linuxserver/radarr:${RADARR_VERSION}
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${RADARR_PORT}:7878"
    volumes:
      - ${CONFIG_DIR}/radarr:/config
      - ${DATA_DIR}/torrents:/data/torrents
      - ${DATA_DIR}/media/films:/data/media/films
    restart: unless-stopped

  sonarr:
    # Gestion et téléchargement automatique des séries. / Automatic series management and downloading.
    # Mounts limités à torrents + media/series pour préserver les hardlinks. / Mounts limited to torrents + media/series to preserve hardlinks.
    image: lscr.io/linuxserver/sonarr:${SONARR_VERSION}
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${SONARR_PORT}:8989"
    volumes:
      - ${CONFIG_DIR}/sonarr:/config
      - ${DATA_DIR}/torrents:/data/torrents
      - ${DATA_DIR}/media/series:/data/media/series
    restart: unless-stopped

  lidarr:
    # Gestion et téléchargement automatique de la musique. / Automatic music management and downloading.
    # Utiliser la catégorie qBittorrent "music" pour éviter les conflits *Arr. / Use the "music" qBittorrent category to avoid *Arr conflicts.
    # Mounts limités à torrents + media/musique pour préserver les hardlinks. / Mounts limited to torrents + media/musique to preserve hardlinks.
    image: lscr.io/linuxserver/lidarr:${LIDARR_VERSION}
    container_name: lidarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${LIDARR_PORT}:8686"
    volumes:
      - ${CONFIG_DIR}/lidarr:/config
      - ${DATA_DIR}/torrents:/data/torrents
      - ${DATA_DIR}/media/musique:/data/media/musique
    restart: unless-stopped

  # ===========================================================================
  # Automatisation jeux vidéo / Video game automation
  # ===========================================================================

  questarr:
    # Gestion et téléchargement automatique de jeux via qBittorrent. / Automatic game management and downloading via qBittorrent.
    # Configurer le client sur gluetun:8080 avec la catégorie "games". / Configure the client on gluetun:8080 with the "games" category. 
    image: ghcr.io/doezer/questarr:latest
    container_name: questarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SQLITE_DB_PATH=/app/data/sqlite.db
    ports:
      - "${QUESTARR_PORT}:5000"
    volumes:
      - ${CONFIG_DIR}/questarr:/app/data
      - ${DATA_DIR}/torrents:/data/torrents
      - ${DATA_DIR}/media/jeux:/data/media/jeux
    restart: unless-stopped

  # ===========================================================================
  # Bibliothèque jeux vidéo / Video game library
  # ===========================================================================

  gamevault-db:
    # Base PostgreSQL dédiée à GameVault. / Dedicated PostgreSQL database for GameVault.
    # Définir GAMEVAULT_DB_PASSWORD dans .env avant le premier démarrage. / Set GAMEVAULT_DB_PASSWORD in .env before first startup.
    image: postgres:15
    container_name: gamevault-db
    environment:
      - POSTGRES_USER=gamevault
      - POSTGRES_PASSWORD=${GAMEVAULT_DB_PASSWORD}
      - POSTGRES_DB=gamevault
    volumes:
      - ${CONFIG_DIR}/gamevault-db:/var/lib/postgresql/data
    restart: unless-stopped

  gamevault:
    # Serveur de bibliothèque de jeux — indexe les fichiers depuis /files. / Video game library server — indexes files from /files.
    # Attend que gamevault-db soit prêt avant de se connecter. / Waits for gamevault-db to be ready before connecting.
    image: phalcode/gamevault-backend:${GAMEVAULT_VERSION}
    container_name: gamevault
    environment:
      - TZ=${TZ}
      - DB_HOST=gamevault-db
      - DB_USERNAME=gamevault
      - DB_PASSWORD=${GAMEVAULT_DB_PASSWORD}
    ports:
      - "${GAMEVAULT_PORT}:8080"
    volumes:
      - ${CONFIG_DIR}/gamevault/media:/media
      - ${DATA_DIR}/media/jeux:/files
    depends_on:
      - gamevault-db
    restart: unless-stopped

  # ===========================================================================
  # Portail de demandes / Request portal
  # ===========================================================================

  jellyseerr:
    # Interface de demandes connectée à Jellyfin, Radarr et Sonarr. / Request interface connected to Jellyfin, Radarr and Sonarr.
    # Ne pilote pas Lidarr nativement — gérer la musique directement dans Lidarr. / Does not natively control Lidarr — manage music directly in Lidarr.
    image: ghcr.io/seerr-team/seerr:${JELLYSEERR_VERSION}
    container_name: jellyseerr
    user: "${PUID}:${PGID}"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${JELLYSEERR_PORT}:5055"
    volumes:
      - ${CONFIG_DIR}/jellyseerr:/app/config
    restart: unless-stopped

  # ===========================================================================
  # Serveur multimédia / Media server
  # ===========================================================================

  jellyfin:
    # Serveur de streaming — lit les médias depuis /data/media. / Streaming server — reads media from /data/media.
    # Radarr, Sonarr et Lidarr notifient les imports via le connecteur Emby/Jellyfin. / Radarr, Sonarr and Lidarr notify imports via the Emby/Jellyfin connector.
    # Le bloc GPU est géré automatiquement par : make configure-gpu-jellyfin (override + .env). / The GPU block is automatically handled by: make configure-gpu-jellyfin (override + .env).
    image: lscr.io/linuxserver/jellyfin:${JELLYFIN_VERSION}
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - "${JELLYFIN_PORT}:8096"
    volumes:
      - ${CONFIG_DIR}/jellyfin:/config
      - ${DATA_DIR}/media:/data/media
    tmpfs:
      - /transcode:size=8G
    restart: unless-stopped

  # ===========================================================================
  # Tableau de bord central / Central dashboard
  # ===========================================================================

  homarr:
    # Tableau de bord donnant accès à tous les services via des widgets. / Dashboard providing access to all services via widgets.
    # Configurer les widgets avec l'IP du serveur (navigateur) ou les hostnames Docker (interne). / Configure widgets with server IP (browser) or Docker hostnames (internal).
    image: ghcr.io/ajnart/homarr:${HOMARR_VERSION}
    container_name: homarr
    environment:
      - TZ=${TZ}
    ports:
      - "${HOMARR_PORT}:7575"
    volumes:
      - ${CONFIG_DIR}/homarr/configs:/app/data/configs
      - ${CONFIG_DIR}/homarr/icons:/app/public/icons
    restart: unless-stopped

  # ===========================================================================
  # Résolution Cloudflare / Cloudflare bypass
  # ===========================================================================

  flaresolverr:
    # Proxy de contournement Cloudflare pour Prowlarr. / Cloudflare bypass proxy used by Prowlarr for certain protected indexers.
    # Configurer dans Prowlarr : Settings > Indexers > FlareSolverr, URL : http://flaresolverr:8191. / Configure in Prowlarr: Settings > Indexers > FlareSolverr, URL: http://flaresolverr:8191.
    # Assigner le tag "flare" uniquement aux indexers qui en ont besoin. / Assign the "flare" tag only to indexers that require it.
    image: ghcr.io/flaresolverr/flaresolverr:${FLARESOLVERR_VERSION}
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - "${FLARESOLVERR_PORT}:8191"
    restart: unless-stopped